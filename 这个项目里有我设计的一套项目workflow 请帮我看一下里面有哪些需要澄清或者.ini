这个项目里有我设计的一套项目workflow 请帮我看一下里面有哪些需要澄清或者修改的部分 然后在workflow中加入（A）加入“任务状态机（Task State Machine）”
目前流程是线性的：
文档更新 → 等待批准 → 实施 → modify → review

但在真实项目中，AI 可能会：

忘记自己处于哪个阶段

在 review 发现问题后不知道回到哪里

在多个任务并行时混淆状态

你可以加入一个简单的状态机：

Code
PENDING_PLAN → WAIT_APPROVAL → IMPLEMENTING → RECORDING_CHANGE → REVIEWING → DONE
并要求 AI 在每个 plan 文件中写明：

Code
current_state: WAIT_APPROVAL
next_state: IMPLEMENTING
这样 Claude Code 就不会乱跳步骤。

🟦（B）加入“任务编号规范”
例如：

Code
task-YYYYMMDD-N
change-YYYYMMDD-N
review-YYYYMMDD-N
并要求：

change 与 review 必须与 plan 编号一致

AI 不得重复编号

AI 必须自动递增编号

这能避免文件冲突。 请帮我对workflow.md 和 claude.md的不足之处进行修改.
